# This workflow will build a Swift project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-swift

name: Swift

on:
  workflow_call:
    secrets:
      MAPBOX_SECRET_TOKEN:
        required: true
      MAPBOX_ACCESS_TOKEN:
        required: true
      XWEATHER_CLIENT_ID:
        required: true
      XWEATHER_CLIENT_SECRET:
        required: true
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    
    runs-on: macos-26
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Select Xcode 26 (Swift 6.2)
      run: sudo xcode-select -s /Applications/Xcode_26.0.app

    - name: Confirm Swift version
      run: swift --version
      
    - name: Setup Tokens
      run: |
        echo "machine api.mapbox.com login mapbox password ${{ secrets.MAPBOX_SECRET_TOKEN }}" >> ~/.netrc
        chmod 0600 ~/.netrc
        
        pushd ./Demo
        cp ./AccessKeys-Sample.plist ./AccessKeys.plist
        defaults write "$(realpath ./AccessKeys.plist)" 'MapboxAccessToken' -string "${{ secrets.MAPBOX_ACCESS_TOKEN }}"
        defaults write "$(realpath ./AccessKeys.plist)" 'XweatherClientID' -string "${{ secrets.XWEATHER_CLIENT_ID }}"
        defaults write "$(realpath ./AccessKeys.plist)" 'XweatherClientSecret' -string "${{ secrets.XWEATHER_CLIENT_SECRET }}"
        popd
      
    - name: Build SwiftUI
      run: |
        DESTINATIONS="$(xcodebuild -showdestinations -project ./Demo.xcodeproj -scheme 'Demo - SwiftUI' 2>&1)"
        IOS_SIMULATOR_ID="$(printf '%s\n' "$DESTINATIONS" | awk '/platform:iOS Simulator/ { if (match($0, /id:[^, }]+/)) print substr($0, RSTART + 3, RLENGTH - 3) }' | head -n 1)"
        if [ -z "$IOS_SIMULATOR_ID" ]; then
          echo "No iOS Simulator destination found for Demo - SwiftUI."
          echo "$DESTINATIONS"
          exit 1
        fi

        xcodebuild build \
          -project ./Demo.xcodeproj \
          -scheme 'Demo - SwiftUI' \
          -destination "id=$IOS_SIMULATOR_ID"
      
    - name: Build UIKit
      run: |
        DESTINATIONS="$(xcodebuild -showdestinations -project ./Demo.xcodeproj -scheme 'Demo - UIKit' 2>&1)"
        IOS_SIMULATOR_ID="$(printf '%s\n' "$DESTINATIONS" | awk '/platform:iOS Simulator/ { if (match($0, /id:[^, }]+/)) print substr($0, RSTART + 3, RLENGTH - 3) }' | head -n 1)"
        if [ -z "$IOS_SIMULATOR_ID" ]; then
          echo "No iOS Simulator destination found for Demo - UIKit."
          echo "$DESTINATIONS"
          exit 1
        fi

        xcodebuild build \
          -project ./Demo.xcodeproj \
          -scheme 'Demo - UIKit' \
          -destination "id=$IOS_SIMULATOR_ID"
